<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
        width: 100%;
        background: blue;
        height: 100px;
        transition: 0.5s;
        }

        /* When the screen is 600px or less (Mobile) */
        @media (max-width: 600px) {
        .container {
            background: red;
            height: 200px; /* Make it bigger for touch users */
        }
    }
</style>
</head>
<body>
<div class="container">Resize the browser window!</div>
</body>
</html>
