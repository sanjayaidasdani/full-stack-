<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form>
        <label for="name">enter name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        <br>
        <label for="gender ">gender  :-</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">male :</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">female :</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">other :</label>
        <br>
        <label for="language ">language :-</label>
        <input type="checkbox" id="english" name="language" value="english">
        <label for="english">english</label>
        <input type="checkbox" id="hindi" name="language" value="hindi">
        <label for="hindi">hindi</label>
        <input type="checkbox" id="gujarati" name="language" value="gujarati">
        <label for="gujarati">gujarati</label>
        <br>
        <label for="selectfile">select file</label>
        <input type="file" value="selectfile" name="selectfile">
        <br>
        <label for="password">enter password</label>
        <input type="password" id="password" name="password">
        <br>
        <label for="date1">enter date </label>
        <input type="date" id="date1" name="date1">

        <br>
        <label for="button">Button</label>
        <input type="submit" value="submit">
    </form  >
</body>
</html>
