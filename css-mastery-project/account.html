<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminara — My Account</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <nav>
<a href="home.html" class="nav-logo"> LUMINARA</a>
    <div class="nav-links">
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
      <a href="order-history.html">Order History</a>

      <div class="auth-buttons">
        <a href="signin.html" class="auth-btn auth-btn-signin">Sign In</a>
        <a href="signup.html" class="auth-btn auth-btn-signup">Sign Up</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <section class="section">
      <div class="grid">
        <div class="card" style="grid-column:span 4;padding:1.2rem;">
          <h2 style="color:var(--gold);font-weight:1000;letter-spacing:1px;">My Account</h2>
          <div style="margin-top:1rem;display:flex;flex-direction:column;gap:0.7rem;">
            <a href="#profile" class="btn btn-secondary" style="justify-content:flex-start;">Profile</a>
            <a href="order-history.html" class="btn btn-secondary" style="justify-content:flex-start;">Order History</a>
            <a href="shipping.html" class="btn btn-secondary" style="justify-content:flex-start;">Address & Shipping</a>
          </div>
        </div>

        <div class="card" style="grid-column:span 8;padding:1.6rem;">
          <div class="section-title" style="text-align:left;margin-bottom:1rem;">
            <h2 style="font-size:1.6rem;margin-bottom:0.2rem;">Profile</h2>
            <p style="margin:0;">Demo account details</p>
          </div>

          <div class="form-row">
            <div>
              <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">Full Name</label>
              <input type="text" value="Sanjay Aidasani" />
            </div>
            <div>
              <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">Email</label>
              <input type="email" value="sanjay@example.com" />
            </div>
          </div>

          <div>
            <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">Address</label>
            <textarea rows="4">D-Mart, Main Road, Pune</textarea>
          </div>

          <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-top:1rem;">
            <a href="order-history.html" class="btn btn-primary">Save & Continue</a>
            <a href="products.html" class="btn btn-secondary">Browse More</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p> LUMINARA © 2024 | Crafted for Eternity | Est. 1999</p>
  </footer>
</body>
</html>
