<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Luminara</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Georgia','Garamond',serif;background:#0a0a0a;color:#e8e8e8;overflow-x:hidden;}

  
    nav{
      position:fixed;top:0;width:100%;
      background:rgba(10,10,10,0.98);
      backdrop-filter:blur(10px);
      padding:1.5rem 2rem;
      z-index:1000;
      border-bottom:1px solid rgba(212,175,55,0.3);
      display:flex;justify-content:space-between;align-items:center;
    }
    .nav-logo{color:#d4af37;font-size:1.3rem;font-weight:800;text-decoration:none;letter-spacing:2px;}
    .nav-links{display:flex;gap:2rem;align-items:center;}
    .nav-links a{color:#e8e8e8;text-decoration:none;font-size:.95rem;letter-spacing:1px;transition:color .3s ease;}
    .nav-links a:hover{color:#d4af37;}
    .auth-buttons{display:flex;gap:1rem;}
    .auth-btn{padding:10px 20px;font-size:.9rem;font-weight:600;border:none;border-radius:4px;cursor:pointer;text-decoration:none;transition:all .3s ease;letter-spacing:.5px;display:inline-block;}
    .auth-btn-signin{background:transparent;color:#d4af37;border:1.5px solid #d4af37;}
    .auth-btn-signin:hover{background:#d4af37;color:#0a0a0a;}
    .auth-btn-signup{background:#d4af37;color:#0a0a0a;font-weight:700;}
    .auth-btn-signup:hover{background:#e8c547;box-shadow:0 8px 20px rgba(212,175,55,0.4);}


    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 50%,#1a1a1a 100%);
      position:relative;
      overflow:hidden;
      padding:9rem 2rem 3rem; /* account for fixed nav */
    }
    .hero::before{content:'';position:absolute;width:800px;height:800px;background:radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%);border-radius:50%;top:-300px;right:-300px;animation:shimmer 8s infinite ease-in-out;}
    .hero::after{content:'';position:absolute;width:800px;height:800px;background:radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);border-radius:50%;bottom:-300px;left:-300px;animation:shimmer 10s infinite ease-in-out;}
    @keyframes shimmer{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(40px) translateX(30px);}}

    .wrap{position:relative;z-index:2;width:100%;max-width:980px;}

    .card{
      margin:0 auto;
      max-width:560px;
      background:rgba(26,26,26,0.78);
      border:1px solid rgba(212,175,55,0.25);
      border-radius:16px;
      box-shadow:0 25px 70px rgba(0,0,0,0.35);
      backdrop-filter:blur(10px);
      padding:2.25rem;
      animation:slideDown .8s ease-out;
    }
    @keyframes slideDown{from{opacity:0;transform:translateY(-18px);}to{opacity:1;transform:translateY(0);}}

    .badge{
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;
      color:#d4af37;
      border:1px solid rgba(212,175,55,0.55);
      background:linear-gradient(135deg,rgba(212,175,55,0.12),rgba(0,0,0,0));
      letter-spacing:.2em;
      text-transform:uppercase;
      font-size:.78rem;
      font-weight:800;
      margin-bottom:1rem;
    }

    h2{font-size:2.1rem;font-weight:500;margin-bottom:.5rem;letter-spacing:.5px;color:#d4af37;}
    .subtitle{color:rgba(232,232,232,0.8);font-size:1rem;line-height:1.6;margin-bottom:1.4rem;}

    form{display:block;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

    label{
      display:block;
      font-size:.78rem;
      color:rgba(232,232,232,0.75);
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:.45rem;
      font-weight:700;
    }
    input{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(212,175,55,0.22);
      background:rgba(10,10,10,0.55);
      color:#e8e8e8;
      outline:none;
      transition:all .25s ease;
      margin-bottom:1rem;
    }
    input::placeholder{color:rgba(168,152,120,0.9);}
    input:focus{border-color:#d4af37;box-shadow:0 0 0 4px rgba(212,175,55,0.12);transform:translateY(-1px);}

    .opts{display:flex;align-items:center;gap:.6rem;margin:1rem 0 1.25rem;}
    .opts input{margin:0;width:18px;height:18px;accent-color:#d4af37;}
    .opts span{color:rgba(232,232,232,0.85);font-size:.95rem;}

    .btn{
      width:100%;
      padding:14px 18px;
      border:none;
      cursor:pointer;
      border-radius:10px;
      background:#d4af37;
      color:#0a0a0a;
      font-weight:900;
      font-size:1.05rem;
      letter-spacing:.5px;
      box-shadow:0 14px 30px rgba(212,175,55,0.25);
      transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
      position:relative;
      overflow:hidden;
    }
    .btn::before{content:'';position:absolute;inset:0;transform:translateX(-120%);background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);transition:transform .6s ease;}
    .btn:hover{transform:translateY(-3px);background:#e8c547;box-shadow:0 18px 40px rgba(212,175,55,0.42);} 
    .btn:hover::before{transform:translateX(120%);} 

    .foot{margin-top:1.25rem;text-align:center;color:rgba(232,232,232,0.7);font-size:.95rem;}
    .foot a{color:#d4af37;text-decoration:none;font-weight:900;}
    .foot a:hover{color:#e8c547;}

    /* Responsive */
    @media (max-width:768px){
      nav{flex-direction:column;gap:1rem;}
      .nav-links{flex-direction:column;gap:1rem;width:100%;}
      .auth-buttons{width:100%;justify-content:center;}
      .hero{padding:9rem 1.2rem 2.5rem;}
      .card{padding:1.5rem;border-radius:14px;}
      .grid-2{grid-template-columns:1fr;}
      h2{font-size:1.8rem;}
    }
  </style>
</head>
<body>
  <nav>
    <a href="#home" class="nav-logo"> LUMINARA</a>
    <div class="nav-links">
      <a href="products.html">Products</a>
      <a href="account.html">My Account</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
      <a href="order-history.html">Order History</a>
      <div class="auth-buttons">
        <a href="signin.html" class="auth-btn auth-btn-signin">Sign In</a>
        <a href="signup.html" class="auth-btn auth-btn-signup">Sign Up</a>
      </div>
    </div>

  </nav>

  <section class="hero" id="home">
    <div class="wrap">
      <div class="card" role="region" aria-label="Sign up form">
        <div class="badge">LUMINARA</div>
        <h2>Create Your Account</h2>
        <p class="subtitle">Join for exclusive collections, personalized styling, and member-only benefits.</p>

        <form>
          <div class="grid-2">
            <div>
              <label for="first">First name</label>
              <input id="first" name="first" type="text" placeholder="Jane" required>
            </div>
            <div>
              <label for="last">Last name</label>
              <input id="last" name="last" type="text" placeholder="Doe" required>
            </div>
          </div>

          <div>
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>
          </div>

          <div class="grid-2">
            <div>
              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="8+ characters" required>
            </div>
            <div>
              <label for="confirm">Confirm password</label>
              <input id="confirm" name="confirm" type="password" placeholder="Repeat password" required>
            </div>
          </div>

          <div class="opts">
            <input type="checkbox" id="terms" required>
            <span>I agree to the terms and privacy policy</span>
          </div>

          <button class="btn" type="submit">Create account</button>

          <p class="foot">Already have an account? <a href="signin.html">Sign in</a></p>
        </form>
      </div>
    </div>
  </section>
</body>
</html>
