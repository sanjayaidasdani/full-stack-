<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminara — Checkout</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <nav>
<a href="home.html" class="nav-logo"> LUMINARA</a>
    <div class="nav-links">
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
      <a href="order-history.html">Order History</a>
      <div class="auth-buttons">

        <a href="signin.html" class="auth-btn auth-btn-signin">Sign In</a>
        <a href="signup.html" class="auth-btn auth-btn-signup">Sign Up</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <section class="section">
      <div class="section-title">
        <h2>Checkout</h2>
        <p>Enter shipping details and proceed to payment.</p>
      </div>

      <div class="grid" style="align-items:start;">
        <div class="card" style="grid-column:span 7;padding:1.6rem;">
          <form>
            <div class="form-row">
              <div>
                <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">First Name</label>
                <input type="text" placeholder="John" required />
              </div>
              <div>
                <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">Last Name</label>
                <input type="text" placeholder="Doe" required />
              </div>
            </div>

            <div class="form-row">
              <div>
                <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">Email</label>
                <input type="email" placeholder="you@example.com" required />
              </div>
              <div>
                <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">Phone</label>
                <input type="tel" placeholder="+1 234 567" required />
              </div>
            </div>

            <div>
              <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">Address</label>
              <textarea rows="4" placeholder="House number, street, area" required></textarea>
            </div>

            <div class="form-row">
              <div>
                <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">City</label>
                <input type="text" placeholder="City" required />
              </div>
              <div>
                <label style="display:block;color:rgba(232,232,232,0.8);font-weight:800;margin-bottom:0.5rem;">Postal Code</label>
                <input type="text" placeholder="ZIP" required />
              </div>
            </div>

            <div style="margin-top:1rem;">
              <a href="payment.html" class="btn btn-primary" style="width:100%;">Continue to Payment</a>
            </div>
          </form>
        </div>

        <div class="card" style="grid-column:span 5;padding:1.6rem;">
          <div class="section-title" style="text-align:left;margin-bottom:0.8rem;">
            <h2 style="font-size:1.4rem;">Order Summary</h2>
            <p style="margin:0;">Demo totals</p>
          </div>

          <div style="color:rgba(232,232,232,0.8);line-height:1.8;">
            <div style="display:flex;justify-content:space-between;">
              <span>Subtotal</span>
              <span style="color:var(--gold);font-weight:900;">$498</span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span>Shipping</span>
              <span>$20</span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span>Tax</span>
              <span>$32</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-weight:1000;font-size:1.2rem;margin-top:0.6rem;">
              <span>Total</span>
              <span style="color:var(--gold);">$550</span>
            </div>
          </div>

          <div style="margin-top:1rem;">
            <div class="tags" style="justify-content:flex-start;max-width:none;">
              <span class="tag">Secure Checkout</span>
              <span class="tag">Easy Returns</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p> LUMINARA © 2024 | Crafted for Eternity | Est. 1999</p>
  </footer>
</body>
</html>
