<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
        width: 100px;
        height: 100px;
        background: #ff0055;
        transition: 0.5s;
        display: flex;
        align-items: center;
        justify-content: center;
        }

        .card:hover {
        /* Scale up by 20%, Move right 20px, and Rotate 15 degrees */
        transform: scale(1.2) translateX(20px) rotate(15deg);
        }
</style>
</head>
<body>
<div class="card">HOVER</div>
</body>
</html>
