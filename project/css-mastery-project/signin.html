<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ShopFlow</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
    <nav>
    <a class="nav-logo" href="landing-page.html">ShopFlow</a>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="account.html">Account</a>
      <a href="order-history.html">Orders</a>
      <a href="cart.html">Cart <span id="cartCount">0</span></a>
      <a href="signin.html" class="auth-btn auth-btn-signin">Sign In</a>
      <a href="signup.html" class="auth-btn auth-btn-signup">Sign Up</a>
    </div>
  </nav>


  <main class="page auth-page">
    <section class="section auth-section">
      <div class="auth-card">
        <span class="eyebrow">Member access</span>
        <h2>Sign in to your account</h2>
        <p>Access your merchant dashboard, orders, and account tools.</p>
        <form id="signInForm">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
          <button class="btn btn-primary" type="submit">Sign In</button>
        </form>
        <p class="auth-help">New here? <a href="signup.html">Create an account</a></p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 ShopFlow. Build your online shop with confidence.</p>
  </footer>
</body>
</html>
