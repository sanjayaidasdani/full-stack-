<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — ShopFlow</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
    <nav>
    <a class="nav-logo" href="landing-page.html">ShopFlow</a>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="account.html">Account</a>
      <a href="order-history.html">Orders</a>
      <a href="cart.html">Cart <span id="cartCount">0</span></a>
      <a href="signin.html" class="auth-btn auth-btn-signin">Sign In</a>
      <a href="signup.html" class="auth-btn auth-btn-signup">Sign Up</a>
    </div>
  </nav>


  <main class="page auth-page">
    <section class="section auth-section">
      <div class="auth-card">
        <span class="eyebrow">Create account</span>
        <h2>Join ShopFlow</h2>
        <p>Create your account to manage your store and orders.</p>
        <form id="signUpForm">
          <div class="grid-2">
            <div><label for="first">First name</label><input id="first" name="first" type="text" placeholder="Jane" required /></div>
            <div><label for="last">Last name</label><input id="last" name="last" type="text" placeholder="Doe" required /></div>
          </div>
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="8+ characters" required />
          <label for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" placeholder="Repeat password" required />
          <button class="btn btn-primary" type="submit">Create account</button>
        </form>
        <p class="auth-help">Already have an account? <a href="signin.html">Sign in</a></p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 ShopFlow. Build your online shop with confidence.</p>
  </footer>
</body>
</html>
